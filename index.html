<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    background: black;
    color: white;
}

/* Center */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Button */
button {
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 30px;
    border: none;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

/* Typing text */
#text {
    font-size: 40px;
    text-align: center;
    margin-top: 20px;
}

/* Slideshow */
.slideshow {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: -1;
}
.slideshow img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    opacity: 0;
    transition: 2s;
}
.active {
    opacity: 0.4;
}

/* Hearts */
.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}
@keyframes float {
    0% {transform: translateY(0); opacity: 1;}
    100% {transform: translateY(-800px); opacity: 0;}
}

/* Proposal */
#proposal {
    display: none;
    text-align: center;
}
#noBtn {
    position: absolute;
}

/* Footer */
.footer {
    position: fixed;
    bottom: 10px;
    right: 15px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<!-- SLIDESHOW -->
<div class="slideshow">
    <img src="https://picsum.photos/800/600?random=1" class="active">
    <img src="https://picsum.photos/800/600?random=2">
    <img src="https://picsum.photos/800/600?random=3">
</div>

<div class="container">

<button onclick="startLove()">Click Me ❤️</button>

<div id="text"></div>

<div id="proposal">
    <h2>Do you love me? 💖</h2>
    <button onclick="yesLove()">Yes ❤️</button>
    <button id="noBtn" onmouseover="moveNo()">No 😜</button>
</div>

</div>

<div class="footer">I am always waiting for you… 💌</div>

<script>

// Typing Effect
let message = "I Love You ❤️\nHariRam 💑";
let i = 0;

function typeEffect() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeEffect, 100);
    } else {
        document.getElementById("proposal").style.display = "block";
    }
}

// Start everything
function startLove() {
    document.getElementById("music").play();
    typeEffect();
    createHearts();
    startSlide();
}

// Hearts
function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 10 + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 300);
}

// Slideshow
let slides = document.querySelectorAll(".slideshow img");
let index = 0;

function startSlide() {
    setInterval(() => {
        slides[index].classList.remove("active");
        index = (index + 1) % slides.length;
        slides[index].classList.add("active");
    }, 3000);
}

// Funny NO button
function moveNo() {
    let btn = document.getElementById("noBtn");
    btn.style.top = Math.random() * 80 + "%";
    btn.style.left = Math.random() * 80 + "%";
}

// YES click
function yesLove() {
    document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;">
        <h1>I Knew It 😍💖</h1>
        <h2>Forever Yours ❤️<br>HariRam 💑</h2>
    </div>`;
}

</script>

</body>
</html>
