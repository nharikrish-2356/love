<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Proposal 💍</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #000000, #2b0a0a);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Center */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

/* Button */
button {
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 30px;
    border: none;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

/* Typing Text */
#text {
    font-size: 45px;
    margin-top: 20px;
    min-height: 60px;
}

/* Name Animation */
.name {
    font-size: 50px;
    color: #ff4d6d;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ff4d6d; }
    to { text-shadow: 0 0 30px #ff1e4d; }
}

/* Countdown */
#countdown {
    margin-top: 20px;
    font-size: 25px;
}

/* Hearts */
.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0); opacity: 1;}
    100% {transform: translateY(-800px); opacity: 0;}
}

/* Proposal Box */
#proposal {
    display: none;
}

#noBtn {
    position: absolute;
}

/* Footer */
.footer {
    position: fixed;
    bottom: 10px;
    right: 15px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<div class="container">

<button onclick="start()">Click My Heart ❤️</button>

<div id="text"></div>

<div id="countdown"></div>

<div id="proposal">
    <h1>Will You Be Mine Forever? 💍</h1>
    <button onclick="yes()">Yes 💖</button>
    <button id="noBtn" onmouseover="moveNo()">No 😜</button>
</div>

</div>

<div class="footer">I am always waiting for you… 💌</div>

<script>

// 🔴 EDIT HER NAME HERE
let herName = "Your Love ❤️"; // <-- CHANGE THIS

// Typing message
let message = `Hey ${herName}...\nI have something special to tell you...\nI Love You ❤️\nHariRam 💑`;
let i = 0;

function type() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(type, 80);
    } else {
        document.getElementById("proposal").style.display = "block";
    }
}

// Start
function start() {
    document.getElementById("music").play();
    type();
    hearts();
    countdown();
}

// Hearts
function hearts() {
    setInterval(() => {
        let h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "💖";
        h.style.left = Math.random()*100+"vw";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),5000);
    },300);
}

// Funny NO
function moveNo() {
    let btn = document.getElementById("noBtn");
    btn.style.top = Math.random()*80+"%";
    btn.style.left = Math.random()*80+"%";
}

// YES
function yes() {
    document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;">
        <h1>She Said YES 💖😍</h1>
        <h2>Forever Starts Now 💍<br>HariRam 💑</h2>
    </div>`;
}

// Countdown
function countdown() {
    let target = new Date();
    target.setMinutes(target.getMinutes() + 1); // 1 min demo

    let interval = setInterval(() => {
        let now = new Date().getTime();
        let distance = target - now;

        let seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML =
        "Special moment in: " + seconds + "s ⏳";

        if (distance < 0) {
            clearInterval(interval);
            document.getElementById("countdown").innerHTML = "Now ❤️";
        }
    }, 1000);
}

</script>

</body>
</html>
