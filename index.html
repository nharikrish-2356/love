<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Proposal 💍</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Center */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

/* Button */
button {
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 30px;
    border: none;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

/* Text */
#text {
    font-size: 40px;
    margin-top: 20px;
}

/* Countdown */
#countdown {
    margin-top: 20px;
    font-size: 25px;
}

/* Hearts */
.heart {
    position: absolute;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0); opacity: 1;}
    100% {transform: translateY(-800px); opacity: 0;}
}

/* Fireworks */
.spark {
    position: absolute;
    width: 4px;
    height: 4px;
    background: yellow;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    from { transform: translate(0,0); opacity:1; }
    to { transform: translate(var(--x), var(--y)); opacity:0; }
}

/* Proposal */
#proposal { display: none; }
#noBtn { position: absolute; }

/* Footer */
.footer {
    position: fixed;
    bottom: 10px;
    right: 15px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<div class="container">

<button onclick="start()">Click My Heart ❤️</button>

<div id="text"></div>
<div id="countdown"></div>

<div id="proposal">
    <h1>Will You Be Mine Forever? 💍</h1>
    <button onclick="yes()">Yes 💖</button>
    <button id="noBtn" onmouseover="moveNo()">No 😜</button>
</div>

</div>

<div class="footer">I am always waiting for you… 💌</div>

<script>

// 👉 EDIT NAME HERE
let herName = "Anjali ❤️";

// Typing text
let msg = `Hey ${herName}...\nI Love You ❤️\nHariRam 💑`;
let i = 0;

function type() {
    if (i < msg.length) {
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(type, 80);
    } else {
        document.getElementById("proposal").style.display = "block";
    }
}

// Start
function start() {
    document.getElementById("music").play();
    type();
    hearts();
    countdown();
}

// Hearts
function hearts() {
    setInterval(() => {
        let h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "💖";
        h.style.left = Math.random()*100+"vw";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),5000);
    },300);
}

// Funny NO button
function moveNo() {
    let btn = document.getElementById("noBtn");
    btn.style.top = Math.random()*80+"%";
    btn.style.left = Math.random()*80+"%";
}

// YES + Fireworks 🎆
function yes() {
    document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;">
        <h1>She Said YES 💖😍</h1>
        <h2>Forever Starts Now 💍<br>HariRam 💑</h2>
    </div>`;

    startFireworks();
}

// Fireworks
function createFirework(x, y) {
    for (let i = 0; i < 30; i++) {
        let spark = document.createElement("div");
        spark.className = "spark";

        let angle = Math.random() * 2 * Math.PI;
        let distance = Math.random() * 150;

        spark.style.left = x + "px";
        spark.style.top = y + "px";

        spark.style.setProperty('--x', Math.cos(angle)*distance + "px");
        spark.style.setProperty('--y', Math.sin(angle)*distance + "px");

        document.body.appendChild(spark);

        setTimeout(() => spark.remove(), 1000);
    }
}

function startFireworks() {
    setInterval(() => {
        createFirework(
            Math.random()*window.innerWidth,
            Math.random()*window.innerHeight
        );
    }, 500);
}

// Countdown
function countdown() {
    let target = new Date();
    target.setMinutes(target.getMinutes() + 1);

    let interval = setInterval(() => {
        let now = new Date().getTime();
        let distance = target - now;

        let seconds = Math.floor((distance % (1000*60)) / 1000);

        document.getElementById("countdown").innerHTML =
        "Special moment in: " + seconds + "s ⏳";

        if (distance < 0) {
            clearInterval(interval);
            document.getElementById("countdown").innerHTML = "Now ❤️";
        }
    }, 1000);
}

</script>

</body>
</html>
